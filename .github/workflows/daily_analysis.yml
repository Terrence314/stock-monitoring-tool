name: Daily Stock Analysis

on:
  schedule:
    # 12:30 UTC = 8:30 PM HKT — runs before US market open Mon–Fri
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab for testing

env:
  # Force all JS actions onto Node 24 (Node 20 deprecated June 2 2026).
  # Covers peaceiris/actions-gh-pages@v4 which has no Node24 release yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push report to gh-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore persisted data from GitHub Pages
        # Fetch all stateful JSON files so the pipeline accumulates state across runs.
        # pattern_history.json + pattern_events.json must be restored or patterns
        # re-trigger as "new" every day and the pattern backtest never builds up.
        # tier2_history.json tracks Tier 2 membership streaks — must persist across runs.
        # broad_scan_latest.json and favourites.json are also restored from Pages.
        run: |
          mkdir -p outputs data
          BASE="https://terrence314.github.io/stock-monitoring-tool"
          for FILE in score_history.json alert_history.json last_analysis.json paper_portfolio.json pattern_history.json pattern_events.json broad_scan_latest.json; do
            curl -f -s "$BASE/$FILE" -o "outputs/$FILE" || echo "  $FILE not yet on Pages — will be created this run"
          done
          # Restore data/ files (tier2_history + favourites) from Pages
          for FILE in tier2_history.json favourites.json; do
            curl -f -s "$BASE/$FILE" -o "data/$FILE" || echo "  data/$FILE not yet on Pages — using repo default"
          done

      - name: Run analysis
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_URL:          ${{ secrets.REPORT_URL }}
          DISPATCH_TOKEN:      ${{ secrets.DISPATCH_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:   ${{ secrets.SUPABASE_ANON_KEY }}
        run: python src/main.py

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./outputs
          keep_files:   true
