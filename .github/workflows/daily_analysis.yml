name: Daily Stock Analysis

on:
  schedule:
    # 12:30 UTC = 8:30 PM HKT — runs before US market open Mon–Fri
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab for testing

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push report to gh-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore persisted data from GitHub Pages
        # Fetch all stateful JSON files so the pipeline accumulates state across runs.
        # pattern_history.json + pattern_events.json must be restored or patterns
        # re-trigger as "new" every day and the pattern backtest never builds up.
        run: |
          mkdir -p outputs
          BASE="https://terrence314.github.io/stock-monitoring-tool"
          for FILE in score_history.json alert_history.json last_analysis.json paper_portfolio.json pattern_history.json pattern_events.json; do
            curl -f -s "$BASE/$FILE" -o "outputs/$FILE" || echo "  $FILE not yet on Pages — will be created this run"
          done

      - name: Run analysis
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_URL:          ${{ secrets.REPORT_URL }}
          DISPATCH_TOKEN:      ${{ secrets.DISPATCH_TOKEN }}
        run: python src/main.py

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./outputs
          keep_files:   true
