name: Price Refresh (15-min)

on:
  schedule:
    # Hourly during US market hours (9am–5pm ET), Mon–Fri
    # EDT (Apr–Oct): 13:00–21:00 UTC  |  EST (Nov–Mar): 14:00–22:00 UTC
    # GitHub throttles high-frequency schedules on free repos down to ~4x/day;
    # hourly (:03) is reliably fired every time, giving 9 guaranteed runs/day.
    - cron: "3 13-21 * * 1-5"
  workflow_dispatch:
    # Manual trigger for testing

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push updated report to gh-pages

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch persisted data from GitHub Pages
        run: |
          mkdir -p outputs
          BASE="https://terrence314.github.io/stock-monitoring-tool"
          # AI analysis cache (required — provides previous scores for exit alert detection)
          curl -f -s "$BASE/last_analysis.json" -o outputs/last_analysis.json \
            && echo "  ✅ AI cache loaded" \
            || echo '{"stock_results":[],"morning_brief":"","market":{},"fear_greed":{},"date":""}' \
               > outputs/last_analysis.json && echo "  ⚠️  No AI cache — using empty fallback"
          # Exit alert cooldown history (optional — prevents duplicate alerts)
          curl -f -s "$BASE/exit_alert_history.json" -o outputs/exit_alert_history.json \
            && echo "  ✅ Exit alert history loaded" \
            || echo "{}" > outputs/exit_alert_history.json \
            && echo "  ⚠️  No exit alert history — starting fresh"

      - name: Run price refresh
        # No GEMINI_API_KEY — this step calls yfinance only
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_URL:         ${{ secrets.REPORT_URL }}
          DISPATCH_TOKEN:     ${{ secrets.DISPATCH_TOKEN }}
        run: python src/price_refresh.py

      - name: Deploy updated report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./outputs
          keep_files:   true
